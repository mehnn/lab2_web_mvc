<!doctype html>
<html lang="uk">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CHIIIIKS — Профіль</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand brand-wrap" href="index.html">
                <img class="brand-logo-img" src="assets/logo.png" alt="CHIIIIKS logo">
                <span class="brand-text">CHIIIIKS</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div id="nav" class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto gap-lg-2">
                    <li class="nav-item"><a class="nav-link" href="app.html">Додаток</a></li>
                    <li class="nav-item"><a class="nav-link active" href="profile.html">Профіль</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="glass p-4 p-md-5">
            <div class="d-flex justify-content-between align-items-center gap-2 flex-wrap">
                <div>
                    <h1 class="h3 fw-bold mb-1">Профіль</h1>
                    <p class="small-muted mb-0">Дані та прогрес зберігаються локально в браузері.</p>
                </div>
                <button id="logoutBtn" class="btn btn-soft">Вийти</button>
            </div>

            <hr class="my-4">

            <div class="row g-3">
                <div class="col-lg-6">
                    <div class="table-responsive">
                        <table id="profileTable" class="table table-bordered align-middle mb-0">
                            <tbody>
                                <tr><th style="width:35%;">Ім'я</th><td id="pName"></td></tr>
                                <tr><th>Email</th><td id="pEmail"></td></tr>
                                <tr><th>Стать</th><td id="pGender"></td></tr>
                                <tr><th>Дата народження</th><td id="pDob"></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="col-lg-6">
                    <div class="row g-3">
                        <div class="col-6">
                            <div class="kpi">
                                <div class="small-muted">Вивчено слів</div>
                                <div class="n"><span id="kKnown">0</span></div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="kpi">
                                <div class="small-muted">Всього слів у базі</div>
                                <div class="n"><span id="kTotal">0</span></div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="kpi">
                                <div class="small-muted">Прогрес</div>
                                <div class="n"><span id="kPct">0</span>%</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="kpi">
                                <div class="small-muted">Точність квізу</div>
                                <div class="n"><span id="kAcc">0</span>%</div>
                                <div class="small-muted"><span id="kQuiz">0/0</span></div>
                            </div>
                        </div>
                    </div>
                    <div class="mt-3">
                        <div class="small-muted mb-2">Загальний прогрес по базі:</div>
                        <div class="progress" style="height: 10px;">
                            <div id="progressBarAll" class="progress-bar" style="width:0%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-5 py-4">
        <div class="container d-flex flex-wrap gap-2 justify-content-between align-items-center">
            <div class="small-muted">© 2026 CHIIIIKS</div>
            <div class="small-muted">Profile</div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="src/app.js"></script>
</body>
</html>
